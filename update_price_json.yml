name: Update Dashboard Data

on:
  workflow_dispatch:  # Manual trigger — "Run workflow" button in GitHub Actions
  schedule:
    - cron: "0 6 * * *"  # Auto-run daily at 06:00 UTC

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas kaggle

      - name: Fetch MVRV JSON from blockchain.info
        run: |
          curl -fsSL "https://blockchain.info/charts/mvrv?format=json" -o mvrv.json
          echo "MVRV points: $(python3 -c "import json; d=json.load(open('mvrv.json')); print(len(d['values']))")"

      - name: Download Kaggle CSV
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle datasets download -d mczielinski/bitcoin-historical-data --unzip
          ls -lh btcusd_1-min_data.csv

      - name: Generate daily price JSON
        run: python generate_price_json.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mvrv.json btc_daily_price.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update data [$(date -u +%Y-%m-%d)]"
          git push
