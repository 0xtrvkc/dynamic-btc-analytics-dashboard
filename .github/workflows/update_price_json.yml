name: Update MVRV data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch MVRV from BGeometrics
        env:
          API_KEY: ${{ secrets.BGEOMETRICS_API_KEY }}
        run: |
          curl -s "https://bitcoin-data.com/api/mvrv?api_key=$API_KEY" -o mvrv_raw.json
          python3 << 'EOF'
          import json
          raw = json.load(open('mvrv_raw.json'))
          print('Keys:', list(raw.keys()))
          rows = [{'x': entry['t'], 'y': entry['v']} for entry in raw['data']]
          out = {'values': rows}
          json.dump(out, open('mvrv.json', 'w'))
          print(f'OK: {len(rows)} rows written')
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mvrv.json
          git diff --staged --quiet || git commit -m "chore: update MVRV data"
          git push
