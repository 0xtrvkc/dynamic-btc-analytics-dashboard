name: Update MVRV data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch MVRV from blockchain.info
        run: |
          curl -s "https://api.blockchain.info/charts/mvrv?timespan=all&sampled=false&format=json&cors=true" \
            -o mvrv.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mvrv.json
          git diff --staged --quiet || git commit -m "chore: update MVRV data"
          git push
