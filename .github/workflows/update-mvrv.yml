name: Update MVRV Data

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6am UTC
  workflow_dispatch:        # manual trigger button in Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Fetch MVRV data
        run: python scrape_mvrv.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mvrv.json
          git diff --staged --quiet || git commit -m "auto: update mvrv.json $(date -u +%Y-%m-%d)"
          git push
