name: Update MVRV Data

on:
  schedule:
    - cron: '0 1 * * *'   # runs daily at 01:00 UTC
  workflow_dispatch:        # allows manual trigger from Actions tab

jobs:
  update-mvrv:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Scrape and download mvrv.json
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');
          const os = require('os');

          (async () => {
            const downloadDir = path.join(os.tmpdir(), 'bc_download');
            fs.mkdirSync(downloadDir, { recursive: true });

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({ acceptDownloads: true });
            const page = await context.newPage();

            // Intercept the internal API call and capture the raw JSON directly
            // This is more reliable than waiting for the download button
            let capturedData = null;
            await page.route('**', async (route) => {
              const url = route.request().url();
              const method = route.request().method();
              // Log all XHR/fetch requests to help identify the data endpoint
              if (method === 'GET' && (url.includes('mvrv') || url.includes('chart'))) {
                console.log('Intercepted request: ' + url);
              }
              await route.continue();
            });

            page.on('response', async (response) => {
              const url = response.url();
              if (url.includes('mvrv') && response.status() === 200) {
                try {
                  const text = await response.text();
                  const json = JSON.parse(text);
                  if (json.metric1 === 'mvrv' && Array.isArray(json.mvrv) && json.mvrv.length > 100) {
                    console.log('Captured MVRV data from: ' + url);
                    console.log('Data points: ' + json.mvrv.length);
                    capturedData = json;
                  }
                } catch (e) {
                  // not JSON or not the right shape, skip
                }
              }
            });

            console.log('Navigating to MVRV chart page...');
            await page.goto('https://www.blockchain.com/explorer/charts/mvrv', {
              waitUntil: 'domcontentloaded',
              timeout: 60000,
            });

            // Wait for the ALL button to appear in the DOM
            console.log('Waiting for ALL button...');
            await page.waitForSelector('button', { timeout: 30000 });

            // Click ALL timeframe
            console.log('Clicking ALL timeframe button...');
            const allButton = page.getByRole('button', { name: /^all$/i });
            await allButton.waitFor({ timeout: 15000 });
            await allButton.click();

            // Wait up to 40s for the network response to be captured
            console.log('Waiting for chart data to load...');
            const deadline = Date.now() + 40000;
            while (!capturedData && Date.now() < deadline) {
              await page.waitForTimeout(1000);
            }

            // If we captured the data via network intercept, save it directly
            if (capturedData) {
              console.log('Saving captured JSON directly (no download needed)...');
              fs.writeFileSync('mvrv.json', JSON.stringify(capturedData));
            } else {
              // Fallback: try clicking the Download JSON button
              console.log('Network capture failed, trying Download JSON button...');
              const [download] = await Promise.all([
                page.waitForEvent('download', { timeout: 30000 }),
                page.getByRole('button', { name: /download json/i }).click(),
              ]);
              const downloadPath = path.join(downloadDir, 'mvrv.json');
              await download.saveAs(downloadPath);
              fs.copyFileSync(downloadPath, 'mvrv.json');
            }

            await browser.close();

            // Validate
            const raw = fs.readFileSync('mvrv.json', 'utf8');
            let data;
            try {
              data = JSON.parse(raw);
            } catch (e) {
              console.error('ERROR: File is not valid JSON');
              process.exit(1);
            }

            if (!data.metric1 || data.metric1 !== 'mvrv') {
              console.error('ERROR: Unexpected format. metric1=' + data.metric1);
              process.exit(1);
            }
            if (!Array.isArray(data.mvrv) || data.mvrv.length === 0) {
              console.error('ERROR: mvrv array is missing or empty');
              process.exit(1);
            }
            const sample = data.mvrv[0];
            if (!('x' in sample) || !('y' in sample)) {
              console.error('ERROR: Data points missing x/y. Sample: ' + JSON.stringify(sample));
              process.exit(1);
            }

            console.log('Validation passed. Total data points: ' + data.mvrv.length);
            const last = data.mvrv[data.mvrv.length - 1];
            console.log('Latest: date=' + new Date(last.x).toISOString().slice(0,10) + ' mvrv=' + last.y);
          })();
          EOF

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mvrv.json
          if git diff --cached --quiet; then
            echo "No changes to mvrv.json — skipping commit."
          else
            LATEST_Y=$(node -e "const d=require('./mvrv.json'); const last=d.mvrv[d.mvrv.length-1]; console.log(last.y.toFixed(4));")
            LATEST_DATE=$(node -e "const d=require('./mvrv.json'); const last=d.mvrv[d.mvrv.length-1]; console.log(new Date(last.x).toISOString().slice(0,10));")
            git commit -m "chore: update mvrv.json — ${LATEST_DATE} (MVRV: ${LATEST_Y})"
            git push
          fi
